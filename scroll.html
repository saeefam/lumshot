<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- Brand/accent color tokens live here (single source of truth). -->
  <link rel="stylesheet" href="theme.css">
  <style>
    :root {
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      /* Neutral floating-chrome palette — matches the capture overlay's pill
         (overlay.html §palette) so the scroll bar reads as the same product. */
      --pill-bg: #161619;
      --pill-border: rgba(255, 255, 255, 0.12);
      --text: #F2F2F5;
      --idle: #A6A6B0;
      --danger: #FF6259;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: var(--font); }
    #bar {
      position: fixed; inset: 0;
      display: flex; align-items: center; gap: 13px;
      padding: 0 12px 0 16px;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      border-radius: 15px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      -webkit-app-region: drag; user-select: none;
    }
    .rec-dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent-ring);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .rec-dot.done { background: var(--accent); box-shadow: none; animation: none; }
    .rec-dot.error { background: var(--danger, #FF6259); box-shadow: none; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .info { flex: 1; min-width: 168px; color: var(--text); }
    .info .title { font-size: 12.5px; font-weight: 600; display: flex; justify-content: space-between; gap: 10px; }
    .info .title .h { color: var(--idle); font-variant-numeric: tabular-nums; font-weight: 500; }
    .track { margin-top: 6px; height: 4px; border-radius: 3px; background: rgba(255,255,255,0.12); overflow: hidden; }
    .track .fill {
      height: 100%; width: 12%;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      border-radius: 3px; transition: width 0.25s ease;
    }
    /* Indeterminate sweep while scrolling (no known total) */
    .track.indet .fill {
      width: 34%;
      animation: sweep 1.1s ease-in-out infinite;
    }
    @keyframes sweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(320%)} }

    button {
      -webkit-app-region: no-drag;
      border: none; border-radius: 9px;
      padding: 7px 13px; font-size: 12px; font-weight: 600;
      font-family: var(--font); cursor: pointer; white-space: nowrap;
      transition: background 0.12s, transform 0.1s;
    }
    button:active { transform: scale(0.95); }
    #stop   { background: var(--accent); color: var(--on-accent); }
    #stop:hover { background: var(--accent-hover); }
    #cancel { background: rgba(255,255,255,0.08); color: var(--danger); }
    #cancel:hover { background: rgba(255, 98, 89, 0.18); }
  </style>
</head>
<body>
  <div id="bar">
    <div class="rec-dot" id="dot"></div>
    <div class="info">
      <div class="title"><span id="status">Starting…</span><span class="h" id="height">0 px</span></div>
      <div class="track indet" id="track"><div class="fill" id="fill"></div></div>
    </div>
    <button id="cancel" title="Discard">Cancel</button>
    <button id="stop" title="Finish with what's captured">Stop</button>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const heightEl = document.getElementById('height');
    const track = document.getElementById('track');
    const fill  = document.getElementById('fill');
    const dot   = document.getElementById('dot');

    window.electronAPI.onScrollStatus(({ status, height, progress, done }) => {
      if (status) statusEl.textContent = status;
      if (typeof height === 'number') heightEl.textContent = `${height.toLocaleString()} px`;
      // progress 0..1 → determinate bar; otherwise keep the indeterminate sweep.
      if (typeof progress === 'number' && progress > 0) {
        track.classList.remove('indet');
        fill.style.width = `${Math.min(100, Math.round(progress * 100))}%`;
      }
      if (done) {
        track.classList.remove('indet');
        fill.style.width = '100%';
        dot.classList.add('done');
      }
    });

    document.getElementById('stop').addEventListener('click', () => window.electronAPI.scrollDone());
    document.getElementById('cancel').addEventListener('click', () => window.electronAPI.scrollCancel());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.electronAPI.scrollCancel();
      if (e.key === 'Enter')  window.electronAPI.scrollDone();
    });
  </script>
</body>
</html>
