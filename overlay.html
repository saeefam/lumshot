<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- Brand/accent color tokens live here (single source of truth). -->
  <link rel="stylesheet" href="theme.css">
  <style>
    /* Google Sans — only the 400 (regular) cut is publicly distributable; 500/600
       below are synthetic-bold (Chromium embolden) approximations of the spec's
       medium/semibold weights. See assets/fonts/GoogleSans-Regular.woff2. */
    @font-face {
      font-family: 'Google Sans';
      src: url('assets/fonts/GoogleSans-Regular.woff2') format('woff2');
      font-weight: 400 600;
      font-style: normal;
    }
    :root {
      /* Palette per "LumShot Capture Overlay — Build Instructions". The accent
         uses the app's live brand token (theme.css --brand) rather than the
         spec's literal #2EE6B6 — same role (mint capture accent), already the
         app's actual color, so the overlay stays consistent with the rest of
         the product instead of drifting to a one-off hex. */
      --pill-bg: #161619;
      --pill-border: rgba(255, 255, 255, 0.12);
      --hint-border: rgba(255, 255, 255, 0.07);
      --idle: #A6A6B0;
      --dot: #70707B;
      --text: #F2F2F5;
      --active: var(--accent, #2EE6B6);
      --active-bg: var(--accent-tint, rgba(46, 230, 182, 0.14));
      --danger: #FF6259;
      --font: 'Google Sans', Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    body { cursor: crosshair; font-family: var(--font); }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    /* ── Main pill ──────────────────────────────────────────────────────── */
    #bar {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 6px;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      cursor: default;
      user-select: none;
      z-index: 10;
    }

    #modes { display: flex; align-items: center; }

    /* Tab button — shared by every tab. Width hugs its own content (no forced
       equal widths: "Full Screen" is naturally wider than "OCR"); height stays
       identical since padding/icon/label sizes never change. */
    .mode {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 13px;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: var(--idle);
      font-family: var(--font);
      font-size: 10.5px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.13s ease, color 0.13s ease, transform 0.1s ease;
    }
    .mode svg { width: 19px; height: 19px; }
    .mode:hover { background: rgba(255, 255, 255, 0.06); color: var(--text); }
    .mode:active { transform: scale(0.95); }
    .mode.active {
      background: var(--active-bg);
      color: var(--active);
      font-weight: 600;
    }
    .mode.active:hover { background: var(--active-bg); color: var(--active); }

    /* Divider — placed once, directly before Cancel, nowhere else. */
    .divider { width: 1px; height: 26px; background: var(--pill-border); margin: 0 3px; flex-shrink: 0; }

    #cancel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 13px;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: var(--danger);
      font-family: var(--font);
      font-size: 10.5px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.13s ease, color 0.13s ease, transform 0.1s ease;
    }
    #cancel svg { width: 19px; height: 19px; }
    #cancel:hover { background: rgba(255, 255, 255, 0.06); }
    #cancel:active { transform: scale(0.95); }

    /* Contextual hint pill below the bar */
    #hint {
      position: fixed;
      top: 108px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--pill-bg);
      border: 1px solid var(--hint-border);
      color: var(--idle);
      padding: 8px 16px;
      border-radius: 999px;
      font-family: var(--font);
      font-size: 11.5px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
      transition: opacity 0.15s ease;
    }
    #hint b { color: var(--text); font-weight: 600; }
    .hint-dot { color: var(--dot); margin: 0 2px; }
    kbd {
      font: 600 10.5px 'Google Sans', monospace;
      background: rgba(255, 255, 255, 0.08);
      color: var(--idle);
      padding: 2px 6px;
      border-radius: 5px;
    }

    /* ── Workflow switching (Normal ↔ AI Screenshot) ────────────────────────
       Two dedicated bars over the same DOM: the AI workflow keeps only the AI
       and Region tabs (AI first — Region is the way back to the normal
       workflow); the normal workflow shows every capture mode plus the AI tab
       as the way in. CSS-only swap, so switching is instant and the reveal
       stays atomic. */
    body.ai-workflow .mode:not([data-mode="ai"]):not([data-mode="region"]) { display: none; }
    body.ai-workflow .mode[data-mode="ai"] { order: -1; }
    /* The AI tab needs a running AI app — unavailable until main reports one. */
    .mode[data-mode="ai"].unavailable { opacity: 0.35; pointer-events: none; }

    /* Overlay switch: brief crossfade/scale on the pill's contents so swapping
       between the General and AI tab sets doesn't feel like a hard cut. */
    #modes { transition: opacity 0.13s ease; }
    body.switching #modes { opacity: 0; }

    /* Scroll-capture: confirm bar shown after the area is selected */
    #scroll-actions {
      position: fixed;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 7px 8px 7px 14px;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      border-radius: 13px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      z-index: 12;
      cursor: default;
      user-select: none;
    }
    #scroll-actions .label { color: var(--idle); font-size: 12px; margin-right: 4px; }
    #scroll-actions button {
      border: none; border-radius: 9px;
      padding: 7px 14px; font-size: 12.5px; font-weight: 600;
      font-family: var(--font); cursor: pointer;
      transition: background 0.12s, transform 0.1s, color 0.12s;
    }
    #scroll-actions button:active { transform: scale(0.95); }
    #sc-start  { background: var(--active); color: var(--on-accent, #04241B); display: flex; align-items: center; gap: 5px; }
    #sc-start svg { width: 13px; height: 13px; flex-shrink: 0; }
    #sc-start:hover  { background: var(--accent-hover, var(--active)); }
    #sc-reselect { background: rgba(255,255,255,0.10); color: var(--text); }
    #sc-reselect:hover { background: rgba(255,255,255,0.18); }
    #sc-cancel { background: rgba(255,255,255,0.06); color: var(--danger); }
    #sc-cancel:hover { background: rgba(255, 98, 89, 0.18); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="bar">
    <div id="modes">
      <!-- Region — ph-selection-plus. Active by default; the way back into the
           General overlay when clicked from within the AI workflow. -->
      <button class="mode active" data-mode="region" title="Region / Area capture">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M152,40a8,8,0,0,1-8,8H112a8,8,0,0,1,0-16h32A8,8,0,0,1,152,40Zm-8,168H112a8,8,0,0,0,0,16h32a8,8,0,0,0,0-16ZM208,48V72a8,8,0,0,0,16,0V48a16,16,0,0,0-16-16H184a8,8,0,0,0,0,16Zm8,56a8,8,0,0,0-8,8v32a8,8,0,0,0,16,0V112A8,8,0,0,0,216,104ZM40,152a8,8,0,0,0,8-8V112a8,8,0,0,0-16,0v32A8,8,0,0,0,40,152Zm32,56H48V184a8,8,0,0,0-16,0v24a16,16,0,0,0,16,16H72a8,8,0,0,0,0-16ZM72,32H48A16,16,0,0,0,32,48V72a8,8,0,0,0,16,0V48H72a8,8,0,0,0,0-16ZM240,208H224V192a8,8,0,0,0-16,0v16H192a8,8,0,0,0,0,16h16v16a8,8,0,0,0,16,0V224h16a8,8,0,0,0,0-16Z"/></svg>
        <span>Region</span>
      </button>
      <!-- Window — ph-app-window. -->
      <button class="mode" data-mode="window" title="Capture a window">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm0,160H40V56H216V200ZM80,84A12,12,0,1,1,68,72,12,12,0,0,1,80,84Zm40,0a12,12,0,1,1-12-12A12,12,0,0,1,120,84Z"/></svg>
        <span>Window</span>
      </button>
      <!-- Full Screen — ph-corners-out. -->
      <button class="mode" data-mode="fullscreen" title="Capture the full screen">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,48V88a8,8,0,0,1-16,0V56H168a8,8,0,0,1,0-16h40A8,8,0,0,1,216,48ZM88,200H56V168a8,8,0,0,0-16,0v40a8,8,0,0,0,8,8H88a8,8,0,0,0,0-16Zm120-40a8,8,0,0,0-8,8v32H168a8,8,0,0,0,0,16h40a8,8,0,0,0,8-8V168A8,8,0,0,0,208,160ZM88,40H48a8,8,0,0,0-8,8V88a8,8,0,0,0,16,0V56H88a8,8,0,0,0,0-16Z"/></svg>
        <span>Full Screen</span>
      </button>
      <!-- Scroll — ph-scroll. -->
      <button class="mode" data-mode="scroll" title="Scrolling capture (stitch a long page)">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M96,104a8,8,0,0,1,8-8h64a8,8,0,0,1,0,16H104A8,8,0,0,1,96,104Zm8,40h64a8,8,0,0,0,0-16H104a8,8,0,0,0,0,16Zm128,48a32,32,0,0,1-32,32H88a32,32,0,0,1-32-32V64a16,16,0,0,0-32,0c0,5.74,4.83,9.62,4.88,9.66h0A8,8,0,0,1,24,88a7.89,7.89,0,0,1-4.79-1.61h0C18.05,85.54,8,77.61,8,64A32,32,0,0,1,40,32H176a32,32,0,0,1,32,32V168h8a8,8,0,0,1,4.8,1.6C222,170.46,232,178.39,232,192ZM96.26,173.48A8.07,8.07,0,0,1,104,168h88V64a16,16,0,0,0-16-16H67.69A31.71,31.71,0,0,1,72,64V192a16,16,0,0,0,32,0c0-5.74-4.83-9.62-4.88-9.66A7.82,7.82,0,0,1,96.26,173.48ZM216,192a12.58,12.58,0,0,0-3.23-8h-94a26.92,26.92,0,0,1,1.21,8,31.82,31.82,0,0,1-4.29,16H200A16,16,0,0,0,216,192Z"/></svg>
        <span>Scroll</span>
      </button>
      <!-- OCR — ph-scan. Its own capture mode: drag to select an area, then it
           opens in the editor's OCR (text-extraction) flow. Mutually exclusive
           with the others, like every mode here. -->
      <button class="mode" data-mode="ocr" title="OCR — capture an area and extract its text">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M224,40V80a8,8,0,0,1-16,0V48H176a8,8,0,0,1,0-16h40A8,8,0,0,1,224,40ZM80,208H48V176a8,8,0,0,0-16,0v40a8,8,0,0,0,8,8H80a8,8,0,0,0,0-16Zm136-40a8,8,0,0,0-8,8v32H176a8,8,0,0,0,0,16h40a8,8,0,0,0,8-8V176A8,8,0,0,0,216,168ZM40,88a8,8,0,0,0,8-8V48H80a8,8,0,0,0,0-16H40a8,8,0,0,0-8,8V80A8,8,0,0,0,40,88ZM80,72h96a8,8,0,0,1,8,8v96a8,8,0,0,1-8,8H80a8,8,0,0,1-8-8V80A8,8,0,0,1,80,72Zm8,96h80V88H88Z"/></svg>
        <span>OCR</span>
      </button>
      <!-- AI Snap — ph-sparkle. Its own dedicated workflow: region-select, then
           the capture is pasted straight into the chosen AI/code app. In the AI
           workflow this tab and Region are the only two shown (see the
           body.ai-workflow rules above). -->
      <button class="mode unavailable" data-mode="ai" title="AI Snap — capture straight into your AI app">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M197.58,129.06,146,110l-19-51.62a15.92,15.92,0,0,0-29.88,0L78,110l-51.62,19a15.92,15.92,0,0,0,0,29.88L78,178l19,51.62a15.92,15.92,0,0,0,29.88,0L146,178l51.62-19a15.92,15.92,0,0,0,0-29.88ZM137,164.22a8,8,0,0,0-4.74,4.74L112,223.85,91.78,169A8,8,0,0,0,87,164.22L32.15,144,87,123.78A8,8,0,0,0,91.78,119L112,64.15,132.22,119a8,8,0,0,0,4.74,4.74L191.85,144ZM144,40a8,8,0,0,1,8-8h16V16a8,8,0,0,1,16,0V32h16a8,8,0,0,1,0,16H184V64a8,8,0,0,1-16,0V48H152A8,8,0,0,1,144,40ZM248,88a8,8,0,0,1-8,8h-8v8a8,8,0,0,1-16,0V96h-8a8,8,0,0,1,0-16h8V72a8,8,0,0,1,16,0v8h8A8,8,0,0,1,248,88Z"/></svg>
        <span>AI Snap</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Cancel — ph-x. Danger tab, no separate idle/active state. -->
    <button id="cancel" title="Cancel (Esc)">
      <svg viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>
      <span>Cancel</span>
    </button>
  </div>

  <!-- Populated per-mode by updateHint(). -->
  <div id="hint" style="display: none"></div>

  <div id="scroll-actions">
    <span class="label">Capture this area?</span>
    <button id="sc-reselect">Reselect</button>
    <button id="sc-cancel">Cancel</button>
    <button id="sc-start">
      <svg viewBox="0 0 256 256" fill="currentColor"><path d="M232.4,114.49,88.32,26.35a16,16,0,0,0-16.2-.3A15.86,15.86,0,0,0,64,39.87V216.13A15.94,15.94,0,0,0,80,232a16.07,16.07,0,0,0,8.36-2.35L232.4,141.51a15.81,15.81,0,0,0,0-27ZM80,215.94V40l143.83,88Z"/></svg>
      Start Capture
    </button>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
