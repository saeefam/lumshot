<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Pin</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    /* The image card. Sits inside a small transparent margin so the (subtle)
       drop shadow has room to render. No frame/border — just the rounded image. */
    .pin-card {
      position: absolute;
      inset: 10px;
      box-sizing: border-box;
      border-radius: 12px;
      overflow: hidden;
      background: #0e0e14;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
      /* Intentionally NOT a -webkit-app-region:drag region: on Windows a drag region
         is hit-tested by the OS as the title bar, so the renderer receives no hover
         events over it — which is why the reveal overlay only triggered near the
         no-drag buttons. The card stays no-drag so the WHOLE image captures hover;
         window dragging is handled in JS instead (pin.js → pinDragStart). */
      cursor: grab;
    }
    body.dragging .pin-card { cursor: grabbing; }

    /* Image holder (fills the card). */
    .pin-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #0e0e14;
    }

    .pin-inner img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* Action-button overlay. At rest the screenshot shows cleanly — the scrim is
       fully transparent and the icons are hidden. Hovering ANYWHERE over the image
       (the whole no-drag card is the hover target) darkens it with a subtle scrim
       and fades the icons in, so the actions are discoverable without hunting for a
       tiny hit area. Scrim uses background alpha (not element opacity) so it dims the
       image evenly without washing the icons out. */
    .pin-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(8, 8, 14, 0);
      pointer-events: none;
      transition: background 0.15s ease;
    }
    .pin-card:hover .pin-overlay {
      background: rgba(8, 8, 14, 0.66);
      pointer-events: auto;
    }

    .pin-btn {
      -webkit-app-region: no-drag;       /* buttons must be clickable, not draggable */
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;           /* hidden at rest — fades in when the image is hovered */
      transition: background 0.12s ease, transform 0.08s ease, opacity 0.15s ease;
    }
    .pin-card:hover .pin-btn { opacity: 1; }
    .pin-btn:hover  { background: rgba(255, 255, 255, 0.3); }
    .pin-btn:active { transform: scale(0.92); }
    .pin-btn.close:hover { background: #e5484d; }
    .pin-btn svg { display: block; }

    /* ── Live scroll-capture preview mode ───────────────────────────────── */
    /* Show the whole growing stitch (contain) and hide the action buttons. */
    body.scroll-preview .pin-inner img { object-fit: contain; object-position: top; }
    body.scroll-preview .pin-overlay { display: none; }

    #scroll-hud {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 9px 11px 10px;
      background: linear-gradient(to top, rgba(10,10,16,0.92), rgba(10,10,16,0.0));
      pointer-events: none;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    body.scroll-preview #scroll-hud { display: flex; }
    #scroll-hud .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    #scroll-hud .status { color: #fff; font-size: 11.5px; font-weight: 600; }
    #scroll-hud .h { color: #d7d6f0; font-size: 11px; font-variant-numeric: tabular-nums; }
    #scroll-hud .track { height: 4px; border-radius: 3px; background: rgba(255,255,255,0.18); overflow: hidden; }
    /* Mint accent — matches theme.css --accent (dark). Hardcoded because pin.html
       is CSP-locked and does not link theme.css; keep in sync with the token. */
    #scroll-hud .track .fill {
      height: 100%; width: 12%; border-radius: 3px;
      background: linear-gradient(90deg, #2EE6B6, #52EAC4);
      transition: width 0.25s ease;
    }
    #scroll-hud.indet .track .fill { width: 34%; animation: hudsweep 1.1s ease-in-out infinite; }
    @keyframes hudsweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(320%)} }
    #scroll-hud.done .track .fill { width: 100% !important; animation: none; background: #2EE6B6; }
  </style>
</head>
<body>
  <div class="pin-card">
    <div class="pin-inner">
      <img id="pin-img" alt="" />
      <div class="pin-overlay">
        <!-- Edit -->
        <button class="pin-btn" id="pin-edit" title="Edit in Lumshot" aria-label="Edit in Lumshot">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>
        <!-- Copy -->
        <button class="pin-btn" id="pin-copy" title="Copy to clipboard" aria-label="Copy to clipboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        <!-- Save -->
        <button class="pin-btn" id="pin-save" title="Save image" aria-label="Save image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
        </button>
        <!-- Close / Delete -->
        <button class="pin-btn close" id="pin-close" title="Close pin" aria-label="Close pin">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="scroll-hud" class="indet">
        <div class="row">
          <span class="status" id="hud-status">Scroll-capturing…</span>
          <span class="h" id="hud-height">0 px</span>
        </div>
        <div class="track"><div class="fill" id="hud-fill"></div></div>
      </div>
    </div>
  </div>
  <script src="pin.js"></script>
</body>
</html>
